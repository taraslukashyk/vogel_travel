ald:wght@300;500&family=Ubuntu:wght@300;500&family=Amatic+SC:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0c0c0c;
            --text-color: #f5f5f5;
            --accent-color: #5cc8bd;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            padding: 40px 20px;
        }

        .container { max-width: 1100px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 80px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 40px;
        }

        header h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            font-weight: 300;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.1rem;
        }

        .showcase-section {
            margin-bottom: 150px;
            padding: 90px 40px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            position: relative;
        }

        .section-label {
            position: absolute;
            top: 25px;
            right: 25px;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 4px 12px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        .pairing-info {
            margin-bottom: 50px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
        }

        .lang-block { margin-bottom: 60px; position: relative; }
        .lang-label { position: absolute; left: -25px; top: 10px; font-size: 0.6rem; color: var(--accent-color); transform: rotate(-90deg); transform-origin: left top; font-weight: 800; opacity: 0.4; pointer-events: none; }

        .accent-text { color: var(--accent-color); margin-bottom: 20px; display: block; font-size: 1.8rem; letter-spacing: 0.05em; line-height: 1.2; }
        h2.h { line-height: 1.05; margin-bottom: 15px; }
        p.b { line-height: 1.7; font-size: 1.15rem; max-width: 850px; color: rgba(255,255,255,0.8); margin-bottom: 25px; }
        
        .buttons-row { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 40px; }
        .btn { display: inline-block; padding: 15px 40px; cursor: pointer; transition: all 0.3s; text-decoration: none; text-align: center; border: 1px solid rgba(255,255,255,0.15); color: #fff; text-transform: uppercase; letter-spacing: 0.1em; }

        @media (max-width: 768px) {
            h2.h { font-size: 2.5rem !important; }
            .showcase-section { padding: 40px 20px; }
            .lang-label { left: -15px; }
        }
    </style>
</head>
